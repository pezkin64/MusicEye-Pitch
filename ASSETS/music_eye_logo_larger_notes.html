
<style>
*{box-sizing:border-box;margin:0;padding:0}
@keyframes blink{0%,88%,100%{transform:scaleY(1)}92%{transform:scaleY(0.04)}96%{transform:scaleY(0.04)}}
@keyframes drift{0%,25%{transform:translate(0,0)}30%,55%{transform:translate(5px,-3px)}60%,85%{transform:translate(-4px,3px)}90%,100%{transform:translate(0,0)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulseRing{0%{r:22;opacity:0.9;stroke-width:2.5}100%{r:44;opacity:0;stroke-width:0.5}}
.wrap{padding:2rem 1rem;display:flex;flex-direction:column;gap:2rem;align-items:center;animation:fadeIn 0.6s ease both}
.section-label{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--color-text-secondary);margin-bottom:0.75rem;text-align:center}
.icon-shell{border-radius:22.4%;overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.icon-shell.light{background:#faf7f2}
.icon-shell.dark{background:#1a1208}
.wordmark-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.5rem 2rem;display:flex;align-items:center;gap:1.25rem;width:100%;max-width:400px}
.wordmark-title{font-family:Georgia,serif;font-size:18px;letter-spacing:6px;color:#2a1e10;font-weight:400}
.wordmark-sub{font-family:Georgia,serif;font-size:9px;letter-spacing:4px;color:#b09060;text-transform:uppercase;margin-top:4px}
.wordmark-card.dk{background:#1a1208;border-color:#3a2a14}
.wordmark-card.dk .wordmark-title{color:#f0e4c0}
.wordmark-card.dk .wordmark-sub{color:#c9a96e}
.divider{width:100%;max-width:440px;height:0.5px;background:var(--color-border-tertiary)}
.status{font-family:Georgia,serif;font-size:10px;letter-spacing:3px;color:#c9a96e;text-transform:uppercase;height:16px;text-align:center;transition:opacity 0.25s}
</style>

<script>
const NOTES  = ['♪','♫','♩','♬'];
const LABELS = ['♪ detected','♫ detected','♩ detected','♬ detected'];

const eyes = [
  { nl:'noteLayer', nt:'noteTxt', pr:'pr',   light:true,  off:0    },
  { nl:'nl64',      nt:'nt64',    pr:'pr64', light:true,  off:600  },
  { nl:'nl48',      nt:'nt48',    pr:'pr48', light:true,  off:1100 },
  { nl:'nldk',      nt:'ntdk',    pr:'prdk', light:false, off:300  },
  { nl:'nlwl',      nt:'ntwl',    pr:'prwl', light:true,  off:900  },
  { nl:'nlwd',      nt:'ntwd',    pr:'prwd', light:false, off:1500 },
];

let idx = 0;

function runCycle(eye, noteIdx) {
  const nl = document.getElementById(eye.nl);
  const nt = document.getElementById(eye.nt);
  const pr = document.getElementById(eye.pr);
  if (!nl || !nt) return;

  const sym        = NOTES[noteIdx % NOTES.length];
  const normalFill = eye.light ? 'white' : '#1a1208';
  const detectFill = '#f0b840';

  // reset: start from right, invisible
  nl.style.transition = 'none';
  nl.style.transform  = 'translateX(16px)';
  nl.style.opacity    = '0';
  nt.textContent      = sym;
  nt.style.fill       = normalFill;
  nt.style.fontSize   = '16px';

  requestAnimationFrame(() => requestAnimationFrame(() => {
    nl.style.transition = 'opacity 0.38s ease, transform 0.42s cubic-bezier(.22,.68,0,1.2)';
    nl.style.transform  = 'translateX(0)';
    nl.style.opacity    = '1';
  }));

  // detected: turn orange + bump size
  setTimeout(() => {
    nt.style.fill     = detectFill;
    nt.style.fontSize = '19px';
    if (pr) { pr.style.animation = 'none'; pr.style.opacity = '0'; }
    requestAnimationFrame(() => { if (pr) pr.style.animation = 'pulseRing 0.85s ease-out forwards'; });
    if (eye.nl === 'noteLayer') {
      const lbl = document.getElementById('status');
      lbl.textContent  = LABELS[noteIdx % LABELS.length];
      lbl.style.opacity = '1';
    }
  }, 680);

  // swipe out left
  setTimeout(() => {
    nt.style.fill     = normalFill;
    nt.style.fontSize = '16px';
    nl.style.transition = 'opacity 0.35s ease, transform 0.4s cubic-bezier(.55,0,1,.45)';
    nl.style.transform  = 'translateX(-16px)';
    nl.style.opacity    = '0';
    if (eye.nl === 'noteLayer') {
      document.getElementById('status').style.opacity = '0';
    }
  }, 1550);
}

function tick() {
  eyes.forEach(eye => setTimeout(() => runCycle(eye, idx), eye.off));
  idx = (idx + 1) % NOTES.length;
}

tick();
setInterval(tick, 2800);
</script>
